<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>黒白リサジュー・音響改造 (2D版)</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            background: #000;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        /* Панели */
        .panel {
            position: absolute;
            background: #000;
            border: 2px solid #fff;
            padding: 0;
            min-width: 260px;
            z-index: 1000;
            box-shadow: 4px 4px 0 rgba(255,255,255,0.2);
        }
        .panel-header {
            background: #fff;
            color: #000;
            padding: 6px 10px;
            font-weight: bold;
            font-size: 13px;
            cursor: move;
            border-bottom: 2px solid #000;
            text-transform: uppercase;
        }
        .panel-content {
            padding: 10px 12px;
            color: #ccc;
            font-size: 11px;
        }
        /* Крутилка */
        .knob-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .knob {
            width: 40px;
            height: 40px;
            background: #111;
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: ew-resize;
            position: relative;
        }
        .knob::after {
            content: "";
            position: absolute;
            top: 5px;
            left: 50%;
            width: 2px;
            height: 15px;
            background: #fff;
            transform: translateX(-50%) rotate(calc( var(--val, 0) * 270deg ));
            transform-origin: bottom center;
        }
        .knob-value {
            width: 45px;
            text-align: right;
            font-family: monospace;
        }
        button, select {
            background: #000;
            border: 1px solid #fff;
            color: #fff;
            padding: 5px;
            width: 100%;
            margin-top: 6px;
            cursor: pointer;
            font-family: monospace;
        }
        button:hover {
            background: #fff;
            color: #000;
        }
        canvas {
            display: block;
            background: #0a0a0a;
            border: 1px solid #fff;
            margin-top: 8px;
        }
        .meter {
            border: 1px solid #fff;
            padding: 4px;
            margin: 8px 0;
        }
        .meter-bar {
            height: 6px;
            background: #222;
        }
        .meter-fill {
            width: 0%;
            height: 100%;
            background: #fff;
        }
        .status {
            font-size: 9px;
            margin-top: 8px;
            text-align: center;
        }
        .flex {
            display: flex;
            gap: 8px;
            margin: 8px 0;
        }
    </style>
</head>
<body>

<div id="mainCanvasContainer" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; display:flex; justify-content:center; align-items:center;">
    <canvas id="lissajousCanvas" width="800" height="600" style="width:80%; height:auto; border:2px solid #fff; background:#000;"></canvas>
</div>

<!-- Панель 1: Параметры Лиссажу -->
<div id="panelLiss" class="panel" style="top:20px; left:20px; width:280px;">
    <div class="panel-header">◈ リサジュー / グリッチ</div>
    <div class="panel-content">
        <div class="knob-row"><span>周波数 X</span><div class="knob" id="knobFX"></div><span id="freqX_val" class="knob-value">3.00</span></div>
        <div class="knob-row"><span>周波数 Y</span><div class="knob" id="knobFY"></div><span id="freqY_val" class="knob-value">4.00</span></div>
        <div class="knob-row"><span>位相 δ</span><div class="knob" id="knobPh"></div><span id="phase_val" class="knob-value">90°</span></div>
        <div class="knob-row"><span>グリッチ強度</span><div class="knob" id="knobGlitch"></div><span id="glitch_val" class="knob-value">0.00</span></div>
        <div class="knob-row"><span>ピクセル分解</span><div class="knob" id="knobPixel"></div><span id="pixel_val" class="knob-value">1</span></div>
        <div class="flex"><button id="dotModeBtn">◉ 点/線切替</button><button id="invertBtn">☯ 反転</button></div>
    </div>
</div>

<!-- Панель 2: Аудиоэффекты -->
<div id="panelFx" class="panel" style="top:20px; left:320px; width:280px;">
    <div class="panel-header">⚡ 音響改造</div>
    <div class="panel-content">
        <div class="knob-row"><span>Low EQ</span><div class="knob" id="knobLowEQ"></div><span id="lowEQ_val" class="knob-value">0dB</span></div>
        <div class="knob-row"><span>Mid EQ</span><div class="knob" id="knobMidEQ"></div><span id="midEQ_val" class="knob-value">0dB</span></div>
        <div class="knob-row"><span>High EQ</span><div class="knob" id="knobHighEQ"></div><span id="highEQ_val" class="knob-value">0dB</span></div>
        <div class="knob-row"><span>コンプ閾値</span><div class="knob" id="knobThresh"></div><span id="thresh_val" class="knob-value">-20dB</span></div>
        <div class="knob-row"><span>歪み量</span><div class="knob" id="knobDist"></div><span id="dist_val" class="knob-value">0.00</span></div>
        <div class="knob-row"><span>リバーブ量</span><div class="knob" id="knobReverb"></div><span id="reverb_val" class="knob-value">0.00</span></div>
    </div>
</div>

<!-- Панель 3: Аудиовход + визуализация -->
<div id="panelAudio" class="panel" style="top:20px; right:20px; width:300px;">
    <div class="panel-header">🎙️ 音声入力 ｜ 計測</div>
    <div class="panel-content">
        <canvas id="waveCanvas" width="280" height="70" style="width:100%; height:70px;"></canvas>
        <canvas id="specCanvas" width="280" height="70" style="width:100%; height:70px;"></canvas>
        <div class="meter"><div class="meter-bar"><div id="vuFill" class="meter-fill"></div></div><div id="vuText" style="font-size:9px;">0%</div></div>
        <div class="flex"><button id="micBtn">🎤 マイク起動</button><button id="uploadBtn">📁 ファイル読込</button></div>
        <div class="status" id="audioStatus">⚫ オーディオ停止</div>
    </div>
</div>

<!-- Панель 4: Дополнительные объекты -->
<div id="panelObj" class="panel" style="bottom:20px; left:20px; width:280px;">
    <div class="panel-header">▣ 追加造形物</div>
    <div class="panel-content">
        <select id="objType">
            <option value="circle">円</option><option value="rect">四角</option><option value="triangle">三角</option>
        </select>
        <div class="knob-row"><span>サイズ</span><div class="knob" id="knobSize"></div><span id="size_val" class="knob-value">30</span></div>
        <div class="flex"><button id="addObjBtn">➕ 追加</button><button id="clearObjBtn">🗑️ 全削除</button></div>
        <div class="status" id="objCount">生成数: 0</div>
    </div>
</div>

<script>
    // ---------- 1. キャンバスと描画 ----------
    const canvas = document.getElementById('lissajousCanvas');
    const ctx = canvas.getContext('2d');
    let width = canvas.width, height = canvas.height;
    let centerX = width/2, centerY = height/2;

    // パラメータ
    let params = {
        freqX: 3.0, freqY: 4.0, phase: 90,
        glitch: 0, pixel: 1,
        invert: false, dotMode: false,
        lowEQ: 0, midEQ: 0, highEQ: 0,
        compThresh: -20, distAmt: 0, reverbMix: 0,
        objSize: 30
    };

    // 追加オブジェクトの配列
    let extraObjects = [];  // каждый: {type, x, y, size}

    // オーディオ関連
    let audioCtx = null, sourceNode = null, analyser = null;
    let isAudioActive = false;
    let freqData = [], timeData = [];
    let avgVolume = 0;

    // ---------- 2. ノブ制御 (ユニバーサル) ----------
    function makeKnob(knobId, minVal, maxVal, initVal, callback, isInt=false, suffix='') {
        const knob = document.getElementById(knobId);
        const span = document.getElementById(knobId.replace('knob','')+'_val');
        let current = initVal;
        const updateUI = () => {
            const perc = (current - minVal) / (maxVal - minVal);
            knob.style.setProperty('--val', perc);
            if (span) span.innerText = (isInt ? Math.round(current) : current.toFixed(2)) + suffix;
            callback(current);
        };
        const setValue = (v) => {
            current = Math.min(maxVal, Math.max(minVal, v));
            if (isInt) current = Math.round(current);
            updateUI();
        };
        setValue(initVal);
        knob.addEventListener('mousedown', (e) => {
            const startX = e.clientX;
            const startVal = current;
            const onMove = (me) => {
                let delta = (me.clientX - startX) * 0.008;
                let newVal = startVal + delta * (maxVal - minVal);
                setValue(newVal);
            };
            const onUp = () => {
                window.removeEventListener('mousemove', onMove);
                window.removeEventListener('mouseup', onUp);
            };
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
            e.preventDefault();
        });
        return { set: setValue };
    }

    makeKnob('knobFX', 0.5, 9.0, 3.0, v => { params.freqX = v; });
    makeKnob('knobFY', 0.5, 9.0, 4.0, v => { params.freqY = v; });
    makeKnob('knobPh', 0, 360, 90, v => { params.phase = v; });
    makeKnob('knobGlitch', 0, 1.5, 0, v => { params.glitch = v; });
    makeKnob('knobPixel', 1, 12, 1, v => { params.pixel = Math.floor(v); });
    makeKnob('knobLowEQ', -12, 12, 0, v => { params.lowEQ = v; updateAudioFX(); });
    makeKnob('knobMidEQ', -12, 12, 0, v => { params.midEQ = v; updateAudioFX(); });
    makeKnob('knobHighEQ', -12, 12, 0, v => { params.highEQ = v; updateAudioFX(); });
    makeKnob('knobThresh', -40, 0, -20, v => { params.compThresh = v; updateAudioFX(); });
    makeKnob('knobDist', 0, 1.2, 0, v => { params.distAmt = v; updateAudioFX(); });
    makeKnob('knobReverb', 0, 1.0, 0, v => { params.reverbMix = v; updateAudioFX(); });
    makeKnob('knobSize', 10, 80, 30, v => { params.objSize = v; });

    document.getElementById('dotModeBtn').onclick = () => { params.dotMode = !params.dotMode; };
    document.getElementById('invertBtn').onclick = () => { params.invert = !params.invert; };

    // ---------- 3. オーディオエフェクトチェイン ----------
    function createAudioChain() {
        if (!audioCtx) return;
        // Создаём узлы
        const low = audioCtx.createBiquadFilter(); low.type = 'lowshelf'; low.frequency.value = 200;
        const mid = audioCtx.createBiquadFilter(); mid.type = 'peaking'; mid.frequency.value = 1000; mid.Q.value = 1;
        const high = audioCtx.createBiquadFilter(); high.type = 'highshelf'; high.frequency.value = 5000;
        const comp = audioCtx.createDynamicsCompressor(); comp.knee.value = 6;
        const shaper = audioCtx.createWaveShaper();
        const reverb = audioCtx.createConvolver();
        const dryWet = audioCtx.createGain();
        const master = audioCtx.createGain();
        const analys = audioCtx.createAnalyser(); analys.fftSize = 512;
        // Сохраняем глобально
        window.eqLow = low; window.eqMid = mid; window.eqHigh = high;
        window.compressor = comp; window.waveshaper = shaper;
        window.reverbNode = reverb; window.reverbDryWet = dryWet;
        window.masterGain = master; window.analyser = analys;
        updateAudioFX();
        // Подключение (позже подключим source)
    }
    function makeDistCurve(amt) {
        let n = 44100, curve = new Float32Array(n);
        for (let i = 0; i < n; i++) {
            let x = (i * 2 / n) - 1;
            curve[i] = (3 + amt) * x * Math.PI * 0.7 / (Math.PI + amt * Math.abs(x));
        }
        return curve;
    }
    function updateAudioFX() {
        if (!window.eqLow) return;
        window.eqLow.gain.value = params.lowEQ;
        window.eqMid.gain.value = params.midEQ;
        window.eqHigh.gain.value = params.highEQ;
        window.compressor.threshold.value = params.compThresh;
        window.compressor.ratio.value = 4; // фиксировано для простоты
        window.waveshaper.curve = makeDistCurve(params.distAmt);
        if (params.reverbMix > 0.01 && audioCtx) {
            const sr = audioCtx.sampleRate;
            const len = sr * 1.2;
            const impulse = audioCtx.createBuffer(2, len, sr);
            for (let ch = 0; ch < 2; ch++) {
                let chan = impulse.getChannelData(ch);
                for (let i = 0; i < len; i++) chan[i] = (Math.random() * 2 - 1) * Math.exp(-i / (sr * 0.3));
            }
            window.reverbNode.buffer = impulse;
        } else window.reverbNode.buffer = null;
        window.reverbDryWet.gain.value = Math.min(1.0, params.reverbMix);
    }
    async function startAudioWithStream(stream) {
        if (audioCtx) await audioCtx.close();
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        createAudioChain();
        const source = audioCtx.createMediaStreamSource(stream);
        source.connect(window.eqLow);
        window.eqLow.connect(window.eqMid); window.eqMid.connect(window.eqHigh);
        window.eqHigh.connect(window.compressor);
        window.compressor.connect(window.waveshaper);
        window.waveshaper.connect(window.masterGain);
        window.waveshaper.connect(window.reverbNode); window.reverbNode.connect(window.reverbDryWet); window.reverbDryWet.connect(window.masterGain);
        window.masterGain.connect(window.analyser);
        window.analyser.connect(audioCtx.destination);
        await audioCtx.resume();
        isAudioActive = true;
        document.getElementById('audioStatus').innerText = '🎤 マイク + エフェクトON';
    }
    async function startAudioWithFile(file) {
        if (audioCtx) await audioCtx.close();
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        createAudioChain();
        const buf = await file.arrayBuffer();
        const decoded = await audioCtx.decodeAudioData(buf);
        const bs = audioCtx.createBufferSource();
        bs.buffer = decoded; bs.loop = true;
        bs.connect(window.eqLow);
        // та же цепь
        window.eqLow.connect(window.eqMid); window.eqMid.connect(window.eqHigh);
        window.eqHigh.connect(window.compressor);
        window.compressor.connect(window.waveshaper);
        window.waveshaper.connect(window.masterGain);
        window.waveshaper.connect(window.reverbNode); window.reverbNode.connect(window.reverbDryWet); window.reverbDryWet.connect(window.masterGain);
        window.masterGain.connect(window.analyser);
        window.analyser.connect(audioCtx.destination);
        bs.start(0);
        await audioCtx.resume();
        isAudioActive = true;
        document.getElementById('audioStatus').innerHTML = `▶️ ${file.name.slice(0,24)}`;
    }
    document.getElementById('micBtn').onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            await startAudioWithStream(stream);
        } catch(e) { document.getElementById('audioStatus').innerText = 'マイクエラー'; }
    };
    document.getElementById('uploadBtn').onclick = () => {
        let inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'audio/*';
        inp.onchange = async (e) => { if(e.target.files[0]) await startAudioWithFile(e.target.files[0]); };
        inp.click();
    };

    function updateAudioMeters() {
        if (!isAudioActive || !window.analyser) { avgVolume *= 0.98; return; }
        const freqLen = window.analyser.frequencyBinCount;
        if (freqData.length !== freqLen) { freqData = new Uint8Array(freqLen); timeData = new Uint8Array(window.analyser.fftSize); }
        window.analyser.getByteFrequencyData(freqData);
        window.analyser.getByteTimeDomainData(timeData);
        let sum = 0;
        for (let i=0; i<freqLen; i++) sum += freqData[i];
        avgVolume = sum / freqLen / 255;
        const vu = Math.min(1.0, avgVolume * 1.5);
        document.getElementById('vuFill').style.width = (vu*100)+'%';
        document.getElementById('vuText').innerText = Math.floor(vu*100)+'%';
        // осциллограф
        const wCanvas = document.getElementById('waveCanvas');
        const wCtx = wCanvas.getContext('2d');
        wCtx.fillStyle = '#000'; wCtx.fillRect(0,0,wCanvas.width,wCanvas.height);
        if(timeData.length) {
            wCtx.beginPath(); wCtx.strokeStyle = '#fff';
            let step = timeData.length / wCanvas.width;
            for(let x=0; x<wCanvas.width; x++) {
                let idx = Math.floor(x*step);
                let y = wCanvas.height/2 + ((timeData[idx]-128)/128)*(wCanvas.height/2-4);
                if(x===0) wCtx.moveTo(x,y); else wCtx.lineTo(x,y);
            }
            wCtx.stroke();
        }
        // спектр
        const sCanvas = document.getElementById('specCanvas');
        const sCtx = sCanvas.getContext('2d');
        sCtx.fillStyle = '#000'; sCtx.fillRect(0,0,sCanvas.width,sCanvas.height);
        if(freqData.length) {
            let bw = sCanvas.width / freqLen;
            for(let i=0; i<freqLen; i++) {
                let h = (freqData[i]/255)*sCanvas.height;
                sCtx.fillStyle = '#fff';
                sCtx.fillRect(i*bw, sCanvas.height-h, Math.max(1,bw-1), h);
            }
        }
    }

    // ---------- 4. 追加オブジェクト ----------
    function addObject() {
        const type = document.getElementById('objType').value;
        const size = params.objSize;
        extraObjects.push({
            type: type,
            x: Math.random() * width,
            y: Math.random() * height,
            size: size,
        });
        document.getElementById('objCount').innerText = `生成数: ${extraObjects.length}`;
    }
    function clearObjects() {
        extraObjects = [];
        document.getElementById('objCount').innerText = `生成数: 0`;
    }
    document.getElementById('addObjBtn').onclick = addObject;
    document.getElementById('clearObjBtn').onclick = clearObjects;

    // ---------- 5. Отрисовка Лиссажу и доп. объектов ----------
    let animTime = 0;
    function drawLissajous() {
        ctx.clearRect(0, 0, width, height);
        if (params.invert) ctx.fillStyle = '#fff';
        else ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, width, height);
        ctx.strokeStyle = params.invert ? '#000' : '#fff';
        ctx.fillStyle = params.invert ? '#000' : '#fff';
        
        const a = params.freqX;
        const b = params.freqY;
        const phaseRad = params.phase * Math.PI/180;
        const gl = params.glitch;
        const pix = params.pixel;
        const volImpact = isAudioActive ? avgVolume : 0;
        const dynamicGlitch = gl + volImpact * 0.5;
        const points = 2000;
        ctx.beginPath();
        let first = true;
        for (let i = 0; i <= points; i++) {
            let t = (i / points) * Math.PI * 2;
            let x = Math.sin(a * t + phaseRad + animTime * 0.2) * (width/3);
            let y = Math.sin(b * t) * (height/3);
            if (dynamicGlitch > 0.01) {
                x += Math.sin(t * 37) * dynamicGlitch * 20;
                y += Math.cos(t * 41) * dynamicGlitch * 20;
                if (Math.random() < dynamicGlitch * 0.05) {
                    x += (Math.random() - 0.5) * 15;
                    y += (Math.random() - 0.5) * 15;
                }
            }
            if (pix > 1) {
                let step = pix * 2;
                x = Math.round(x / step) * step;
                y = Math.round(y / step) * step;
            }
            const screenX = centerX + x;
            const screenY = centerY + y;
            if (params.dotMode) {
                ctx.fillRect(screenX, screenY, 2, 2);
            } else {
                if (first) { ctx.moveTo(screenX, screenY); first = false; }
                else ctx.lineTo(screenX, screenY);
            }
        }
        if (!params.dotMode) ctx.stroke();
        
        // Дополнительные объекты
        extraObjects.forEach(obj => {
            ctx.save();
            ctx.strokeStyle = params.invert ? '#000' : '#fff';
            ctx.fillStyle = params.invert ? '#000' : '#fff';
            ctx.beginPath();
            if (obj.type === 'circle') {
                ctx.arc(obj.x, obj.y, obj.size/2, 0, 2*Math.PI);
                ctx.stroke();
            } else if (obj.type === 'rect') {
                ctx.strokeRect(obj.x - obj.size/2, obj.y - obj.size/2, obj.size, obj.size);
            } else if (obj.type === 'triangle') {
                const h = obj.size * 0.866;
                ctx.moveTo(obj.x, obj.y - obj.size/2);
                ctx.lineTo(obj.x + obj.size/2, obj.y + h/2);
                ctx.lineTo(obj.x - obj.size/2, obj.y + h/2);
                ctx.closePath();
                ctx.stroke();
            }
            ctx.restore();
        });
    }

    function animate() {
        updateAudioMeters();
        drawLissajous();
        animTime += 0.02;
        requestAnimationFrame(animate);
    }
    animate();

    // ---------- 6. Перетаскивание окон ----------
    function makeDraggable(panel) {
        const header = panel.querySelector('.panel-header');
        if (!header) return;
        let isDrag = false, offX, offY;
        header.onmousedown = (e) => {
            isDrag = true;
            offX = e.clientX - panel.offsetLeft;
            offY = e.clientY - panel.offsetTop;
            panel.style.zIndex = 1002;
            document.body.style.userSelect = 'none';
            const onMove = (me) => {
                if (!isDrag) return;
                let left = me.clientX - offX;
                let top = me.clientY - offY;
                left = Math.min(Math.max(left, 0), window.innerWidth - panel.offsetWidth);
                top = Math.min(Math.max(top, 0), window.innerHeight - panel.offsetHeight);
                panel.style.left = left + 'px';
                panel.style.top = top + 'px';
            };
            const onUp = () => {
                isDrag = false;
                document.body.style.userSelect = '';
                window.removeEventListener('mousemove', onMove);
                window.removeEventListener('mouseup', onUp);
            };
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
            e.preventDefault();
        };
    }
    document.querySelectorAll('.panel').forEach(p => makeDraggable(p));
    
    // Адаптация размера canvas
    window.addEventListener('resize', () => {
        const container = document.getElementById('mainCanvasContainer');
        const w = container.clientWidth * 0.8;
        canvas.style.width = w + 'px';
        canvas.width = 800;
        canvas.height = 600;
        width = canvas.width; height = canvas.height;
        centerX = width/2; centerY = height/2;
    });
    window.dispatchEvent(new Event('resize'));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>黒白リサジュー・音響改造万象</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', 'MS Gothic', monospace;
        }
        /* Панели — перетаскиваемые */
        .panel {
            position: absolute;
            background: #000;
            border: 3px solid #fff;
            padding: 0;
            min-width: 260px;
            z-index: 1000;
            box-shadow: 6px 6px 0 rgba(255,255,255,0.2);
        }
        .panel-header {
            background: #fff;
            color: #000;
            padding: 5px 8px;
            font-weight: bold;
            font-size: 12px;
            letter-spacing: 2px;
            cursor: move;
            border-bottom: 2px solid #000;
            text-transform: uppercase;
        }
        .panel-content {
            padding: 10px 12px 14px;
            color: #ccc;
            font-size: 10px;
        }
        .knob-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .knob {
            position: relative;
            width: 42px;
            height: 42px;
            background: #111;
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: ew-resize;
        }
        .knob::after {
            content: "";
            position: absolute;
            top: 5px;
            left: 50%;
            width: 2px;
            height: 16px;
            background: #fff;
            transform: translateX(-50%) rotate(calc( var(--val, 0) * 270deg ));
            transform-origin: bottom center;
        }
        .knob-value {
            width: 42px;
            text-align: right;
            font-family: monospace;
            color: #fff;
        }
        button, select {
            background: #000;
            border: 1.5px solid #fff;
            color: #fff;
            padding: 4px 8px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
            width: 100%;
            font-size: 10px;
        }
        button:hover, select:hover {
            background: #fff;
            color: #000;
        }
        canvas.viz-canvas {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #fff;
            display: block;
            margin-top: 6px;
        }
        .meter {
            background: #000;
            border: 1px solid #fff;
            margin: 8px 0;
            padding: 4px;
        }
        .meter-label {
            font-size: 8px;
            display: flex;
            justify-content: space-between;
        }
        .meter-bar {
            height: 6px;
            background: #222;
            margin-top: 3px;
        }
        .meter-fill {
            width: 0%;
            height: 100%;
            background: #fff;
            transition: width 0.03s;
        }
        .status {
            font-size: 8px;
            color: #aaa;
            text-align: center;
            margin-top: 8px;
            border-top: 1px dotted #333;
            padding-top: 5px;
        }
        .flex-btns {
            display: flex;
            gap: 8px;
            margin: 8px 0;
        }
        hr {
            border-color: #333;
            margin: 8px 0;
        }
        select {
            background: #000;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="canvasContainer" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:0;">
    <canvas id="threeCanvas" style="width:100%; height:100%; display:block;"></canvas>
</div>

<!-- Панели -->
<div id="panelLiss" class="panel" style="top:15px; left:15px; width:280px;">
    <div class="panel-header">◈ リサジュー / グリッチ</div>
    <div class="panel-content">
        <div class="knob-row"><span>周波数 X</span><div class="knob" id="knobFX"></div><span id="freqX_val" class="knob-value">3.00</span></div>
        <div class="knob-row"><span>周波数 Y</span><div class="knob" id="knobFY"></div><span id="freqY_val" class="knob-value">4.00</span></div>
        <div class="knob-row"><span>周波数 Z</span><div class="knob" id="knobFZ"></div><span id="freqZ_val" class="knob-value">2.20</span></div>
        <div class="knob-row"><span>位相 XY</span><div class="knob" id="knobPhXY"></div><span id="phaseXY_val" class="knob-value">90°</span></div>
        <div class="knob-row"><span>位相 Z</span><div class="knob" id="knobPhZ"></div><span id="phaseZ_val" class="knob-value">45°</span></div>
        <div class="knob-row"><span>グリッチ強度</span><div class="knob" id="knobGlitch"></div><span id="glitch_val" class="knob-value">0.00</span></div>
        <div class="knob-row"><span>ピクセル分解</span><div class="knob" id="knobPixel"></div><span id="pixel_val" class="knob-value">1</span></div>
        <div class="flex-btns"><button id="dotModeBtn">◉ 点/線切替</button><button id="invertBtn">☯ 反転</button></div>
    </div>
</div>

<div id="panelFx" class="panel" style="top:15px; left:320px; width:290px;">
    <div class="panel-header">⚡ 音響改造</div>
    <div class="panel-content">
        <div class="knob-row"><span>Low EQ</span><div class="knob" id="knobLowEQ"></div><span id="lowEQ_val" class="knob-value">0dB</span></div>
        <div class="knob-row"><span>Mid EQ</span><div class="knob" id="knobMidEQ"></div><span id="midEQ_val" class="knob-value">0dB</span></div>
        <div class="knob-row"><span>High EQ</span><div class="knob" id="knobHighEQ"></div><span id="highEQ_val" class="knob-value">0dB</span></div>
        <hr>
        <div class="knob-row"><span>コンプ閾値</span><div class="knob" id="knobThresh"></div><span id="thresh_val" class="knob-value">-20dB</span></div>
        <div class="knob-row"><span>コンプ比</span><div class="knob" id="knobRatio"></div><span id="ratio_val" class="knob-value">4:1</span></div>
        <div class="knob-row"><span>歪み量</span><div class="knob" id="knobDist"></div><span id="dist_val" class="knob-value">0.00</span></div>
        <div class="knob-row"><span>リバーブ量</span><div class="knob" id="knobReverb"></div><span id="reverb_val" class="knob-value">0.00</span></div>
    </div>
</div>

<div id="panelAudio" class="panel" style="top:15px; right:15px; width:310px;">
    <div class="panel-header">🎙️ 音声入力 ｜ 計測</div>
    <div class="panel-content">
        <canvas id="waveCanvas" width="400" height="70" class="viz-canvas"></canvas>
        <canvas id="specCanvas" width="400" height="70" class="viz-canvas"></canvas>
        <div class="meter"><div class="meter-label">レベル VU <span id="vuText">0%</span></div><div class="meter-bar"><div id="vuFill" class="meter-fill"></div></div></div>
        <div class="meter"><div class="meter-label">低域 (Bass) <span id="bassText">0</span></div><div class="meter-bar"><div id="bassFill" class="meter-fill"></div></div></div>
        <div class="flex-btns"><button id="micBtn">🎤 マイク起動</button><button id="uploadBtn">📁 ファイル読込</button></div>
        <div class="status" id="audioStatus">⚫ オーディオ停止</div>
    </div>
</div>

<div id="panelObjects" class="panel" style="bottom:15px; left:15px; width:290px;">
    <div class="panel-header">▣ 造形物 ｜ 生成・調整</div>
    <div class="panel-content">
        <div class="knob-row"><span>回転速度</span><div class="knob" id="knobRotSpd"></div><span id="rot_val" class="knob-value">0.30</span></div>
        <div class="knob-row"><span>全体スケール</span><div class="knob" id="knobScale"></div><span id="scale_val" class="knob-value">1.00</span></div>
        <select id="objTypeSelect">
            <option value="cube">立方体 (キューブ)</option><option value="sphere">球体 (スフィア)</option><option value="torus">トーラス</option><option value="icosa">二十面体</option>
        </select>
        <div class="knob-row"><span>サイズ</span><div class="knob" id="knobObjSize"></div><span id="size_val" class="knob-value">0.60</span></div>
        <div class="flex-btns"><button id="addObjBtn">➕ オブジェクト追加</button><button id="clearObjsBtn">🗑️ 全削除</button></div>
        <div class="status" id="objCount">生成数: 0</div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- 3D setup ---
    const canvasElem = document.getElementById('threeCanvas');
    const renderer = new THREE.WebGLRenderer({ canvas: canvasElem, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 1);
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(3.3, 2.4, 5.7);
    camera.lookAt(0, 0, 0);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // helpers
    const grid = new THREE.GridHelper(7, 24, 0x444444, 0x222222);
    grid.position.y = -1.6;
    scene.add(grid);
    const axes = new THREE.AxesHelper(2.5);
    axes.material.transparent = true;
    axes.material.opacity = 0.25;
    scene.add(axes);
    const starGeo = new THREE.BufferGeometry();
    const starPos = [];
    for (let i = 0; i < 1500; i++) {
        starPos.push((Math.random() - 0.5) * 200);
        starPos.push((Math.random() - 0.5) * 120);
        starPos.push((Math.random() - 0.5) * 80 - 40);
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
    const starField = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.08 }));
    scene.add(starField);

    // main Lissajous curve
    const POINTS = 3800;
    let lineGeometry = new THREE.BufferGeometry();
    let linePositions = new Float32Array(POINTS * 3);
    lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
    const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff });
    const mainLine = new THREE.Line(lineGeometry, lineMaterial);
    scene.add(mainLine);
    let pointCloud = null;

    // parameters
    let params = {
        freqX: 3.0, freqY: 4.0, freqZ: 2.2,
        phaseXY: 90, phaseZ: 45,
        glitch: 0.0, pixelRes: 1,
        dotMode: false, invert: false,
        globalScale: 1.0, objRotSpeed: 0.3,
        lowEQ: 0, midEQ: 0, highEQ: 0,
        compThresh: -20, compRatio: 4, distAmt: 0, reverbMix: 0,
        objSize: 0.6
    };

    // knob helper
    function makeKnob(domId, minVal, maxVal, initVal, callback, isInt = false, suffix = '') {
        const knobDiv = document.getElementById(domId);
        if (!knobDiv) return;
        let current = initVal;
        const valueSpan = document.getElementById(domId.replace('knob', '') + '_val');
        const setVal = (v) => {
            current = Math.min(maxVal, Math.max(minVal, v));
            if (isInt) current = Math.round(current);
            const perc = (current - minVal) / (maxVal - minVal);
            knobDiv.style.setProperty('--val', perc);
            if (valueSpan) valueSpan.innerText = (isInt ? current : current.toFixed(2)) + suffix;
            callback(current);
        };
        setVal(initVal);
        knobDiv.addEventListener('mousedown', (e) => {
            const startX = e.clientX;
            const startVal = current;
            const onMove = (me) => {
                let delta = (me.clientX - startX) * 0.008;
                let newVal = startVal + delta * (maxVal - minVal);
                setVal(newVal);
            };
            const onUp = () => {
                window.removeEventListener('mousemove', onMove);
                window.removeEventListener('mouseup', onUp);
            };
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
            e.preventDefault();
        });
    }

    makeKnob('knobFX', 0.3, 9.0, 3.0, v => { params.freqX = v; });
    makeKnob('knobFY', 0.3, 9.0, 4.0, v => { params.freqY = v; });
    makeKnob('knobFZ', 0.3, 7.0, 2.2, v => { params.freqZ = v; });
    makeKnob('knobPhXY', 0, 360, 90, v => { params.phaseXY = v; });
    makeKnob('knobPhZ', 0, 360, 45, v => { params.phaseZ = v; });
    makeKnob('knobGlitch', 0, 1.8, 0, v => { params.glitch = v; });
    makeKnob('knobPixel', 1, 12, 1, v => { params.pixelRes = Math.floor(v); });
    makeKnob('knobLowEQ', -12, 12, 0, v => { params.lowEQ = v; updateAudioFX(); });
    makeKnob('knobMidEQ', -12, 12, 0, v => { params.midEQ = v; updateAudioFX(); });
    makeKnob('knobHighEQ', -12, 12, 0, v => { params.highEQ = v; updateAudioFX(); });
    makeKnob('knobThresh', -40, 0, -20, v => { params.compThresh = v; updateAudioFX(); });
    makeKnob('knobRatio', 1, 20, 4, v => { params.compRatio = v; updateAudioFX(); });
    makeKnob('knobDist', 0, 1.2, 0, v => { params.distAmt = v; updateAudioFX(); });
    makeKnob('knobReverb', 0, 1.0, 0, v => { params.reverbMix = v; updateAudioFX(); });
    makeKnob('knobRotSpd', 0, 1.2, 0.3, v => { params.objRotSpeed = v; });
    makeKnob('knobScale', 0.5, 1.8, 1.0, v => { params.globalScale = v; });
    makeKnob('knobObjSize', 0.3, 1.5, 0.6, v => { params.objSize = v; });

    // dot/line toggle
    document.getElementById('dotModeBtn').onclick = () => {
        params.dotMode = !params.dotMode;
        if (params.dotMode) {
            if (pointCloud) scene.remove(pointCloud);
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(POINTS * 3), 3));
            pointCloud = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.045 }));
            scene.add(pointCloud);
            scene.remove(mainLine);
        } else {
            if (pointCloud) scene.remove(pointCloud);
            pointCloud = null;
            scene.add(mainLine);
        }
    };
    document.getElementById('invertBtn').onclick = () => {
        params.invert = !params.invert;
        renderer.setClearColor(params.invert ? 0xffffff : 0x000000, 1);
        lineMaterial.color.setHex(params.invert ? 0x000000 : 0xffffff);
        if (pointCloud) pointCloud.material.color.setHex(params.invert ? 0x000000 : 0xffffff);
        starField.material.color.setHex(params.invert ? 0x444444 : 0xffffff);
    };

    // audio processing
    let audioCtx = null, sourceNode = null, analyser = null;
    let eqLow, eqMid, eqHigh, compressor, waveshaper, reverbNode, reverbDryWet, masterGain;
    let isAudioActive = false;
    let freqData = [], timeData = [], avgVol = 0, bassEnergy = 0;

    function createAudioChain() {
        if (!audioCtx) return;
        eqLow = audioCtx.createBiquadFilter(); eqLow.type = 'lowshelf'; eqLow.frequency.value = 200;
        eqMid = audioCtx.createBiquadFilter(); eqMid.type = 'peaking'; eqMid.frequency.value = 1000; eqMid.Q.value = 1;
        eqHigh = audioCtx.createBiquadFilter(); eqHigh.type = 'highshelf'; eqHigh.frequency.value = 5000;
        compressor = audioCtx.createDynamicsCompressor(); compressor.knee.value = 6;
        waveshaper = audioCtx.createWaveShaper();
        reverbNode = audioCtx.createConvolver();
        reverbDryWet = audioCtx.createGain();
        masterGain = audioCtx.createGain();
        analyser = audioCtx.createAnalyser(); analyser.fftSize = 512;
    }
    function makeDistCurve(amt) {
        let n = 44100; let curve = new Float32Array(n);
        for (let i = 0; i < n; i++) {
            let x = (i * 2 / n) - 1;
            curve[i] = (3 + amt) * x * Math.PI * 0.7 / (Math.PI + amt * Math.abs(x));
        }
        return curve;
    }
    function updateAudioFX() {
        if (!eqLow) return;
        eqLow.gain.value = params.lowEQ;
        eqMid.gain.value = params.midEQ;
        eqHigh.gain.value = params.highEQ;
        compressor.threshold.value = params.compThresh;
        compressor.ratio.value = params.compRatio;
        waveshaper.curve = makeDistCurve(params.distAmt);
        if (params.reverbMix > 0.01 && audioCtx) {
            const sr = audioCtx.sampleRate;
            const len = sr * 1.2;
            const impulse = audioCtx.createBuffer(2, len, sr);
            for (let ch = 0; ch < 2; ch++) {
                let chan = impulse.getChannelData(ch);
                for (let i = 0; i < len; i++) chan[i] = (Math.random() * 2 - 1) * Math.exp(-i / (sr * 0.3));
            }
            reverbNode.buffer = impulse;
        } else {
            reverbNode.buffer = null;
        }
        reverbDryWet.gain.value = Math.min(1.0, params.reverbMix);
    }
    async function startAudioWithStream(stream) {
        if (audioCtx) await audioCtx.close();
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        createAudioChain();
        sourceNode = audioCtx.createMediaStreamSource(stream);
        sourceNode.connect(eqLow);
        eqLow.connect(eqMid); eqMid.connect(eqHigh); eqHigh.connect(compressor);
        compressor.connect(waveshaper);
        waveshaper.connect(masterGain);
        waveshaper.connect(reverbNode); reverbNode.connect(reverbDryWet); reverbDryWet.connect(masterGain);
        masterGain.connect(analyser);
        analyser.connect(audioCtx.destination);
        await audioCtx.resume();
        isAudioActive = true;
        document.getElementById('audioStatus').innerText = '🎤 マイク + エフェクトON';
    }
    async function startAudioWithFile(file) {
        if (audioCtx) await audioCtx.close();
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        createAudioChain();
        const buf = await file.arrayBuffer();
        const decoded = await audioCtx.decodeAudioData(buf);
        const bs = audioCtx.createBufferSource();
        bs.buffer = decoded; bs.loop = true;
        sourceNode = bs;
        bs.connect(eqLow);
        eqLow.connect(eqMid); eqMid.connect(eqHigh); eqHigh.connect(compressor);
        compressor.connect(waveshaper);
        waveshaper.connect(masterGain);
        waveshaper.connect(reverbNode); reverbNode.connect(reverbDryWet); reverbDryWet.connect(masterGain);
        masterGain.connect(analyser);
        analyser.connect(audioCtx.destination);
        bs.start(0);
        await audioCtx.resume();
        isAudioActive = true;
        document.getElementById('audioStatus').innerHTML = `▶️ ${file.name.slice(0,24)}`;
    }
    document.getElementById('micBtn').onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            await startAudioWithStream(stream);
        } catch(e) { document.getElementById('audioStatus').innerText = 'マイクエラー'; }
    };
    document.getElementById('uploadBtn').onclick = () => {
        let inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'audio/*';
        inp.onchange = async (e) => { if(e.target.files[0]) await startAudioWithFile(e.target.files[0]); };
        inp.click();
    };

    function updateAudioMeters() {
        if (!isAudioActive || !analyser) { avgVol *= 0.95; bassEnergy *= 0.95; return; }
        const freqLen = analyser.frequencyBinCount;
        if (freqData.length !== freqLen) { freqData = new Uint8Array(freqLen); timeData = new Uint8Array(analyser.fftSize); }
        analyser.getByteFrequencyData(freqData);
        analyser.getByteTimeDomainData(timeData);
        let sum = 0, bassSum = 0;
        for (let i = 0; i < freqLen; i++) { let v = freqData[i] / 255; sum += v; if (i < 12) bassSum += v; }
        avgVol = sum / freqLen;
        bassEnergy = bassSum / 12;
        const vu = Math.min(1.0, avgVol * 1.8);
        document.getElementById('vuFill').style.width = (vu * 100) + '%';
        document.getElementById('vuText').innerText = Math.floor(vu * 100) + '%';
        const bassMeter = Math.min(1.0, bassEnergy * 1.5);
        document.getElementById('bassFill').style.width = (bassMeter * 100) + '%';
        document.getElementById('bassText').innerText = Math.floor(bassMeter * 100);
        // waveform
        const wCanvas = document.getElementById('waveCanvas');
        const wCtx = wCanvas.getContext('2d');
        wCtx.fillStyle = '#000'; wCtx.fillRect(0, 0, wCanvas.width, wCanvas.height);
        if (timeData.length) {
            wCtx.beginPath(); wCtx.strokeStyle = '#fff'; wCtx.lineWidth = 1.2;
            let step = timeData.length / wCanvas.width;
            for (let x = 0; x < wCanvas.width; x++) {
                let idx = Math.floor(x * step);
                let y = wCanvas.height / 2 + ((timeData[idx] - 128) / 128) * (wCanvas.height / 2 - 4);
                if (x === 0) wCtx.moveTo(x, y); else wCtx.lineTo(x, y);
            }
            wCtx.stroke();
        }
        // spectrum
        const sCanvas = document.getElementById('specCanvas');
        const sCtx = sCanvas.getContext('2d');
        sCtx.fillStyle = '#000'; sCtx.fillRect(0, 0, sCanvas.width, sCanvas.height);
        if (freqData.length) {
            let bw = sCanvas.width / freqLen;
            for (let i = 0; i < freqLen; i++) {
                let h = (freqData[i] / 255) * sCanvas.height;
                sCtx.fillStyle = '#fff';
                sCtx.fillRect(i * bw, sCanvas.height - h, Math.max(1, bw - 0.5), h);
            }
        }
    }

    // dynamic objects
    let dynamicObjects = [];
    function addVisualObject() {
        const type = document.getElementById('objTypeSelect').value;
        let geometry;
        switch(type) {
            case 'cube': geometry = new THREE.BoxGeometry(1,1,1); break;
            case 'sphere': geometry = new THREE.SphereGeometry(0.5, 24, 18); break;
            case 'torus': geometry = new THREE.TorusGeometry(0.5, 0.12, 32, 60); break;
            default: geometry = new THREE.IcosahedronGeometry(0.55, 0);
        }
        const material = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.userData = { baseSize: params.objSize };
        mesh.scale.set(params.objSize, params.objSize, params.objSize);
        mesh.position.set((Math.random() - 0.5) * 4, (Math.random() - 0.5) * 3 - 1, (Math.random() - 0.5) * 4);
        scene.add(mesh);
        dynamicObjects.push(mesh);
        document.getElementById('objCount').innerText = `生成数: ${dynamicObjects.length}`;
    }
    document.getElementById('addObjBtn').onclick = addVisualObject;
    document.getElementById('clearObjsBtn').onclick = () => {
        dynamicObjects.forEach(obj => scene.remove(obj));
        dynamicObjects = [];
        document.getElementById('objCount').innerText = `生成数: 0`;
    };

    // Lissajous update
    let animTime = 0;
    function updateLissajous() {
        const a = params.freqX, b = params.freqY, c = params.freqZ;
        const phXY = params.phaseXY * Math.PI/180;
        const phZ = params.phaseZ * Math.PI/180;
        let amp = 1.2 * params.globalScale;
        let ampZ = 0.9 * params.globalScale;
        const vol = isAudioActive ? avgVol : 0;
        const gl = params.glitch + (isAudioActive ? params.distAmt * 0.3 : 0);
        const jit = (isAudioActive ? params.distAmt * 0.2 : 0);
        const pix = params.pixelRes;
        const positions = (params.dotMode && pointCloud) ? pointCloud.geometry.attributes.position.array : lineGeometry.attributes.position.array;
        if (!positions) return;
        for (let i = 0; i <= POINTS; i++) {
            let t = (i / POINTS) * Math.PI * 2;
            let x = Math.sin(a * t + phXY + animTime * 0.2) * amp;
            let y = Math.sin(b * t) * amp;
            let z = Math.sin(c * t + phZ) * ampZ;
            if (gl > 0.02) {
                x += Math.sin(t * 37) * gl * 0.2;
                y += Math.cos(t * 41 + animTime) * gl * 0.2;
                if (Math.random() < gl * 0.08) z += (Math.random() - 0.5) * gl * 0.3;
            }
            if (jit > 0) {
                x += Math.sin(i * 0.53 + animTime) * jit * 0.15;
                y += Math.cos(i * 0.29 + animTime * 1.2) * jit * 0.15;
            }
            if (pix > 1) {
                let step = pix * 0.04;
                x = Math.round(x / step) * step;
                y = Math.round(y / step) * step;
                z = Math.round(z / step) * step;
            }
            positions[i*3] = x;
            positions[i*3+1] = y;
            positions[i*3+2] = z;
        }
        if (params.dotMode && pointCloud) pointCloud.geometry.attributes.position.needsUpdate = true;
        else lineGeometry.attributes.position.needsUpdate = true;
        const bright = 0.5 + vol * 0.8;
        lineMaterial.color.setRGB(bright, bright, bright);
        if (pointCloud) pointCloud.material.color.setRGB(bright, bright, bright);
    }

    let globalRot = 0;
    function animateObjects() {
        globalRot += params.objRotSpeed * 0.025;
        dynamicObjects.forEach(obj => {
            obj.rotation.x += 0.02;
            obj.rotation.y += 0.025;
            const s = params.objSize * (0.7 + avgVol * 0.8);
            obj.scale.set(s, s, s);
        });
        starField.rotation.y += 0.0006;
    }

    function mainLoop() {
        updateAudioMeters();
        updateLissajous();
        animateObjects();
        controls.update();
        renderer.render(scene, camera);
        animTime += 0.016;
        requestAnimationFrame(mainLoop);
    }
    mainLoop();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // drag panels
    function makeDraggable(panel) {
        const header = panel.querySelector('.panel-header');
        if (!header) return;
        let isDrag = false, offX, offY;
        header.onmousedown = (e) => {
            isDrag = true;
            offX = e.clientX - panel.offsetLeft;
            offY = e.clientY - panel.offsetTop;
            panel.style.zIndex = 1002;
            document.body.style.userSelect = 'none';
            const onMove = (me) => {
                if (!isDrag) return;
                let left = me.clientX - offX;
                let top = me.clientY - offY;
                left = Math.min(Math.max(left, 0), window.innerWidth - panel.offsetWidth);
                top = Math.min(Math.max(top, 0), window.innerHeight - panel.offsetHeight);
                panel.style.left = left + 'px';
                panel.style.top = top + 'px';
            };
            const onUp = () => {
                isDrag = false;
                document.body.style.userSelect = '';
                window.removeEventListener('mousemove', onMove);
                window.removeEventListener('mouseup', onUp);
            };
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
            e.preventDefault();
        };
    }
    document.querySelectorAll('.panel').forEach(p => makeDraggable(p));
    console.log('Ready');
</script>
</body>
</html>

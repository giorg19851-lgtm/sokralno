<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>黒白・多層曲線＋音響分析 (安定版)</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            background: #000;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        .panel {
            position: absolute;
            background: #000;
            border: 2px solid #fff;
            padding: 0;
            min-width: 260px;
            z-index: 1000;
            box-shadow: 4px 4px 0 rgba(255,255,255,0.2);
        }
        .panel-header {
            background: #fff;
            color: #000;
            padding: 6px 10px;
            font-weight: bold;
            font-size: 13px;
            cursor: move;
            border-bottom: 2px solid #000;
            text-transform: uppercase;
        }
        .panel-content {
            padding: 10px 12px;
            color: #ccc;
            font-size: 11px;
            max-height: 65vh;
            overflow-y: auto;
        }
        .knob-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .knob {
            width: 36px;
            height: 36px;
            background: #111;
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: ew-resize;
            position: relative;
        }
        .knob::after {
            content: "";
            position: absolute;
            top: 5px;
            left: 50%;
            width: 2px;
            height: 14px;
            background: #fff;
            transform: translateX(-50%) rotate(calc( var(--val, 0) * 270deg ));
            transform-origin: bottom center;
        }
        .knob-value {
            width: 45px;
            text-align: right;
            font-family: monospace;
        }
        button, select {
            background: #000;
            border: 1px solid #fff;
            color: #fff;
            padding: 4px 6px;
            width: 100%;
            margin-top: 6px;
            cursor: pointer;
            font-family: monospace;
            font-size: 10px;
        }
        button:hover {
            background: #fff;
            color: #000;
        }
        canvas {
            display: block;
            background: #0a0a0a;
            border: 1px solid #fff;
            margin-top: 6px;
        }
        .meter {
            border: 1px solid #fff;
            padding: 3px;
            margin: 6px 0;
        }
        .meter-bar {
            height: 5px;
            background: #222;
        }
        .meter-fill {
            width: 0%;
            height: 100%;
            background: #fff;
        }
        .status {
            font-size: 8px;
            margin-top: 6px;
            text-align: center;
        }
        .flex {
            display: flex;
            gap: 6px;
            margin: 6px 0;
        }
        .small {
            font-size: 8px;
        }
        .layer-card {
            border: 1px solid #444;
            padding: 5px;
            margin-bottom: 8px;
            background: #111;
        }
        .layer-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        input[type="range"] {
            width: 100px;
            background: #333;
        }
        .param-group {
            display: inline-block;
            width: 100%;
        }
    </style>
</head>
<body>

<div id="canvasContainer" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; display:flex; justify-content:center; align-items:center;">
    <canvas id="mainCanvas" width="800" height="600" style="width:80%; height:auto; border:2px solid #fff; background:#000;"></canvas>
</div>

<div id="panelLayers" class="panel" style="top:15px; left:15px; width:320px;">
    <div class="panel-header">◈ レイヤー管理</div>
    <div class="panel-content" id="layersList"></div>
    <button id="addLayerBtn" style="margin:0 10px 10px 10px; width:calc(100% - 20px);">➕ レイヤー追加</button>
    <div class="flex" style="padding:0 10px 10px 10px;"><button id="drawModeBtn">✏️ 手描きモード</button><button id="clearDrawBtn">🗑️ 消去</button></div>
</div>

<div id="panelAudio" class="panel" style="top:15px; right:15px; width:300px;">
    <div class="panel-header">🎙️ 音声・音色分析</div>
    <div class="panel-content">
        <div class="knob-row"><span>Low EQ</span><div class="knob" id="knobLow"></div><span id="lowVal" class="knob-value">0dB</span></div>
        <div class="knob-row"><span>Mid EQ</span><div class="knob" id="knobMid"></div><span id="midVal" class="knob-value">0dB</span></div>
        <div class="knob-row"><span>High EQ</span><div class="knob" id="knobHigh"></div><span id="highVal" class="knob-value">0dB</span></div>
        <div class="knob-row"><span>コンプ閾値</span><div class="knob" id="knobThr"></div><span id="thrVal" class="knob-value">-20dB</span></div>
        <div class="knob-row"><span>歪み</span><div class="knob" id="knobDist"></div><span id="distVal" class="knob-value">0.00</span></div>
        <div class="knob-row"><span>リバーブ</span><div class="knob" id="knobRev"></div><span id="revVal" class="knob-value">0.00</span></div>
        <canvas id="spectrogram" width="260" height="100" style="width:100%; height:100px;"></canvas>
        <canvas id="spectrum" width="260" height="70" style="width:100%; height:70px;"></canvas>
        <div class="meter"><div class="meter-bar"><div id="vuFill" class="meter-fill"></div></div><div id="vuText">0%</div></div>
        <div class="meter"><div class="meter-bar"><div id="bassFill" class="meter-fill"></div></div><div class="small">低域</div></div>
        <div class="meter"><div class="meter-bar"><div id="highFill" class="meter-fill"></div></div><div class="small">高域</div></div>
        <div class="flex"><button id="micBtn">🎤 マイク</button><button id="fileBtn">📁 読込</button></div>
        <div id="audioStatus" class="status">⚫ 停止</div>
        <canvas id="envelope" width="260" height="70" style="width:100%; height:70px; margin-top:8px;"></canvas>
        <div id="dominantFreq" class="status">ドミナント: — Hz</div>
    </div>
</div>

<div id="panelLfo" class="panel" style="bottom:15px; right:15px; width:260px;">
    <div class="panel-header">🌀 LFO 全体</div>
    <div class="panel-content">
        <div class="knob-row"><span>速度倍率</span><div class="knob" id="knobLfoSpeed"></div><span id="lfoSpeedVal" class="knob-value">0.5</span></div>
        <div class="knob-row"><span>深さ倍率</span><div class="knob" id="knobLfoDepth"></div><span id="lfoDepthVal" class="knob-value">0.3</span></div>
        <button id="resetLfoBtn">リセット LFO</button>
        <div class="small">※レイヤーパラメータのLFOは各レイヤーで設定</div>
    </div>
</div>

<script>
(function(){
    // ---------- キャンバス ----------
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    let w = 800, h = 600;
    let centerX = w/2, centerY = h/2;

    // ---------- グローバル変数 ----------
    let layers = [];
    let nextId = 1;
    let globalLfoSpeed = 0.5;
    let globalLfoDepth = 0.3;
    let lfoPhase = 0;
    let drawMode = false;
    let drawPoints = [];
    let isDrawing = false;
    let animTime = 0;

    // ---------- スーパーフォーミュラ ----------
    function superformula(phi, m, n1, n2, n3, r0) {
        const a = 1.0, b = 1.0;
        const t1 = Math.pow(Math.abs(Math.cos(m * phi / 4) / a), n2);
        const t2 = Math.pow(Math.abs(Math.sin(m * phi / 4) / b), n3);
        const r = Math.pow(t1 + t2, -1 / n1);
        return r0 * (isNaN(r) ? 1 : Math.min(2.5, r));
    }

    // ---------- LFO適用 ----------
    function applyLFO(layer, paramName, base, minV, maxV) {
        const lfo = layer.lfo[paramName];
        if (!lfo || !lfo.enabled) return base;
        const speed = lfo.speed * globalLfoSpeed;
        const depth = lfo.depth *全球Lfo深度;
        const mod = Math.sin(lfoPhase * Math.PI * 2 * speed) * depth;
        let val = base + mod * (maxV - minV) * 0.3;
        return Math.min(maxV, Math.max(minV, val));
    }

    // ---------- 全レイヤー描画 ----------
    function drawAllLayers() {
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, w, h);
        // 手描き
        if (drawPoints.length > 1) {
            ctx.beginPath();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            for (let i=0; i<drawPoints.length; i++) {
                if (i===0) ctx.moveTo(drawPoints[i].x, drawPoints[i].y);
                else ctx.lineTo(drawPoints[i].x, drawPoints[i].y);
            }
            ctx.stroke();
        }
        // слои
        for (let layer of layers) {
            if (!layer.visible) continue;
            ctx.save();
            ctx.strokeStyle = `rgb(${layer.color},${layer.color},${layer.color})`;
            ctx.lineWidth = layer.lineWidth;
            ctx.beginPath();
            let first = true;
            const pts = 2000;
            if (layer.type === 'super') {
                let m = applyLFO(layer, 'm', layer.m, 0.5, 20);
                let n1 = applyLFO(layer, 'n1', layer.n1, 0.1, 10);
                let n2 = applyLFO(layer, 'n2', layer.n2, 0.1, 10);
                let n3 = applyLFO(layer, 'n3', layer.n3, 0.1, 10);
                let rad = applyLFO(layer, 'radius', layer.radius, 0.2, 2.5);
                let rot = applyLFO(layer, 'rotation', layer.rotation, -180, 180) * Math.PI/180;
                for (let i=0; i<=pts; i++) {
                    let phi = (i/pts) * Math.PI * 2;
                    let r = superformula(phi, m, n1, n2, n3, rad);
                    let x = r * Math.cos(phi + rot) * (Math.min(w,h)/3);
                    let y = r * Math.sin(phi + rot) * (Math.min(w,h)/3);
                    let sx = centerX + x;
                    let sy = centerY + y;
                    if (first) { ctx.moveTo(sx, sy); first=false; }
                    else ctx.lineTo(sx, sy);
                }
            } else if (layer.type === 'lissajous') {
                let fx = applyLFO(layer, 'freqX', layer.freqX, 0.3, 9);
                let fy = applyLFO(layer, 'freqY', layer.freqY, 0.3, 9);
                let ph = applyLFO(layer, 'phase', layer.phase, 0, 360) * Math.PI/180;
                for (let i=0; i<=pts; i++) {
                    let t = (i/pts) * Math.PI * 2;
                    let x = Math.sin(fx * t + ph + animTime*0.2) * (w/3);
                    let y = Math.sin(fy * t) * (h/3);
                    let sx = centerX + x;
                    let sy = centerY + y;
                    if (first) { ctx.moveTo(sx, sy); first=false; }
                    else ctx.lineTo(sx, sy);
                }
            }
            ctx.stroke();
            ctx.restore();
        }
    }

    // ---------- LFO初期化ヘルパー ----------
    function initLfo(layer, param) {
        if (!layer.lfo[param]) layer.lfo[param] = { enabled: false, speed: 0.5, depth: 0.3 };
    }

    // ---------- レイヤー作成 ----------
    function createLayer(type) {
        let layer = {
            id: nextId++,
            type: type,
            visible: true,
            color: Math.floor(Math.random() * 180 + 75),
            lineWidth: 1.5,
            lfo: {}
        };
        if (type === 'super') {
            layer.m = 5.0; layer.n1 = 1.0; layer.n2 = 1.0; layer.n3 = 1.0; layer.radius = 1.0; layer.rotation = 0;
            ['m','n1','n2','n3','radius','rotation'].forEach(p => initLfo(layer, p));
        } else {
            layer.freqX = 3.0; layer.freqY = 4.0; layer.phase = 90;
            ['freqX','freqY','phase'].forEach(p => initLfo(layer, p));
        }
        return layer;
    }

    // ---------- UI レンダリング ----------
    function renderLayersUI() {
        const container = document.getElementById('layersList');
        if (!container) return;
        container.innerHTML = '';
        for (let layer of layers) {
            const div = document.createElement('div');
            div.className = 'layer-card';
            div.innerHTML = `
                <div class="layer-header">
                    <span>🔘 #${layer.id} (${layer.type})</span>
                    <div><button class="toggleVis" data-id="${layer.id}" style="width:auto;">👁️</button><button class="delLayer" data-id="${layer.id}" style="width:auto;">🗑️</button></div>
                </div>
                <div class="knob-row"><span>明るさ</span><input type="range" min="0" max="255" value="${layer.color}" class="layerColor" data-id="${layer.id}"><span>${layer.color}</span></div>
                <div class="knob-row"><span>線幅</span><input type="range" min="0.5" max="4" step="0.1" value="${layer.lineWidth}" class="layerWidth" data-id="${layer.id}"><span>${layer.lineWidth}</span></div>
            `;
            if (layer.type === 'super') {
                div.innerHTML += `
                    <div class="param-group">m: <input type="range" min="0.5" max="20" step="0.1" value="${layer.m}" class="layerParam" data-id="${layer.id}" data-param="m"><span>${layer.m.toFixed(2)}</span></div>
                    <div class="param-group">n1: <input type="range" min="0.1" max="10" step="0.05" value="${layer.n1}" class="layerParam" data-id="${layer.id}" data-param="n1"><span>${layer.n1.toFixed(2)}</span></div>
                    <div class="param-group">n2: <input type="range" min="0.1" max="10" step="0.05" value="${layer.n2}" class="layerParam" data-id="${layer.id}" data-param="n2"><span>${layer.n2.toFixed(2)}</span></div>
                    <div class="param-group">n3: <input type="range" min="0.1" max="10" step="0.05" value="${layer.n3}" class="layerParam" data-id="${layer.id}" data-param="n3"><span>${layer.n3.toFixed(2)}</span></div>
                    <div class="param-group">半径: <input type="range" min="0.2" max="2.5" step="0.02" value="${layer.radius}" class="layerParam" data-id="${layer.id}" data-param="radius"><span>${layer.radius.toFixed(2)}</span></div>
                    <div class="param-group">回転: <input type="range" min="-180" max="180" step="1" value="${layer.rotation}" class="layerParam" data-id="${layer.id}" data-param="rotation"><span>${layer.rotation}°</span></div>
                `;
                ['m','n1','n2','n3','radius','rotation'].forEach(p => {
                    const l = layer.lfo[p];
                    div.innerHTML += `
                        <div class="flex" style="margin-top:4px;">
                            <input type="checkbox" class="lfoEnable" data-id="${layer.id}" data-param="${p}" ${l.enabled ? 'checked' : ''}><span style="width:40px;">LFO ${p}</span>
                            <input type="range" min="0.1" max="2" step="0.05" value="${l.speed}" class="lfoSpeed" data-id="${layer.id}" data-param="${p}" style="width:60px;"><span>${l.speed.toFixed(2)}</span>
                            <input type="range" min="0" max="1" step="0.05" value="${l.depth}" class="lfoDepth" data-id="${layer.id}" data-param="${p}" style="width:50px;"><span>${l.depth.toFixed(2)}</span>
                        </div>
                    `;
                });
            } else {
                div.innerHTML += `
                    <div class="param-group">freq X: <input type="range" min="0.3" max="9" step="0.1" value="${layer.freqX}" class="layerParam" data-id="${layer.id}" data-param="freqX"><span>${layer.freqX.toFixed(2)}</span></div>
                    <div class="param-group">freq Y: <input type="range" min="0.3" max="9" step="0.1" value="${layer.freqY}" class="layerParam" data-id="${layer.id}" data-param="freqY"><span>${layer.freqY.toFixed(2)}</span></div>
                    <div class="param-group">phase: <input type="range" min="0" max="360" step="1" value="${layer.phase}" class="layerParam" data-id="${layer.id}" data-param="phase"><span>${layer.phase}°</span></div>
                `;
                ['freqX','freqY','phase'].forEach(p => {
                    const l = layer.lfo[p];
                    div.innerHTML += `
                        <div class="flex" style="margin-top:4px;">
                            <input type="checkbox" class="lfoEnable" data-id="${layer.id}" data-param="${p}" ${l.enabled ? 'checked' : ''}><span style="width:40px;">LFO ${p}</span>
                            <input type="range" min="0.1" max="2" step="0.05" value="${l.speed}" class="lfoSpeed" data-id="${layer.id}" data-param="${p}" style="width:60px;"><span>${l.speed.toFixed(2)}</span>
                            <input type="range" min="0" max="1" step="0.05" value="${l.depth}" class="lfoDepth" data-id="${layer.id}" data-param="${p}" style="width:50px;"><span>${l.depth.toFixed(2)}</span>
                        </div>
                    `;
                });
            }
            container.appendChild(div);
        }
        attachLayerEvents();
    }

    function attachLayerEvents() {
        document.querySelectorAll('.toggleVis').forEach(btn => btn.onclick = () => { let l = layers.find(l=>l.id==parseInt(btn.dataset.id)); if(l) l.visible=!l.visible; renderLayersUI(); });
        document.querySelectorAll('.delLayer').forEach(btn => btn.onclick = () => { layers = layers.filter(l=>l.id!=parseInt(btn.dataset.id)); renderLayersUI(); });
        document.querySelectorAll('.layerColor').forEach(sl => sl.oninput = () => { let l = layers.find(l=>l.id==parseInt(sl.dataset.id)); if(l) l.color=parseInt(sl.value); sl.nextElementSibling.innerText=sl.value; });
        document.querySelectorAll('.layerWidth').forEach(sl => sl.oninput = () => { let l = layers.find(l=>l.id==parseInt(sl.dataset.id)); if(l) l.lineWidth=parseFloat(sl.value); sl.nextElementSibling.innerText=sl.value; });
        document.querySelectorAll('.layerParam').forEach(sl => sl.oninput = () => { let l=layers.find(l=>l.id==parseInt(sl.dataset.id)); if(l) { l[sl.dataset.param]=parseFloat(sl.value); sl.nextElementSibling.innerText=l[sl.dataset.param].toFixed(2); } });
        document.querySelectorAll('.lfoEnable').forEach(cb => cb.onchange = () => { let l=layers.find(l=>l.id==parseInt(cb.dataset.id)); if(l && l.lfo[cb.dataset.param]) l.lfo[cb.dataset.param].enabled=cb.checked; });
        document.querySelectorAll('.lfoSpeed').forEach(sl => sl.oninput = () => { let l=layers.find(l=>l.id==parseInt(sl.dataset.id)); if(l && l.lfo[sl.dataset.param]) { l.lfo[sl.dataset.param].speed=parseFloat(sl.value); sl.nextElementSibling.innerText=l.lfo[sl.dataset.param].speed.toFixed(2); } });
        document.querySelectorAll('.lfoDepth').forEach(sl => sl.oninput = () => { let l=layers.find(l=>l.id==parseInt(sl.dataset.id)); if(l && l.lfo[sl.dataset.param]) { l.lfo[sl.dataset.param].depth=parseFloat(sl.value); sl.nextElementSibling.innerText=l.lfo[sl.dataset.param].depth.toFixed(2); } });
    }

    // ---------- Аудио (стабильная реализация) ----------
    let audioCtx = null;
    let sourceNode = null;
    let isAudioActive = false;
    let audioNodes = null;
    let freqData = [], timeData = [];
    let avgVolume = 0, bassEnergy = 0, highEnergy = 0;

    function createAudioChain() {
        if (!audioCtx) return;
        const low = audioCtx.createBiquadFilter(); low.type='lowshelf'; low.frequency.value=200;
        const mid = audioCtx.createBiquadFilter(); mid.type='peaking'; mid.frequency.value=1000; mid.Q.value=1;
        const high = audioCtx.createBiquadFilter(); high.type='highshelf'; high.frequency.value=5000;
        const comp = audioCtx.createDynamicsCompressor(); comp.knee.value=6;
        const shaper = audioCtx.createWaveShaper();
        const reverb = audioCtx.createConvolver();
        const dryWet = audioCtx.createGain();
        const master = audioCtx.createGain();
        const analys = audioCtx.createAnalyser(); analys.fftSize=512;
        audioNodes = { low, mid, high, comp, shaper, reverb, dryWet, master, analys };
        updateAudioFX();
    }
    function makeDistortionCurve(amt) {
        let n=44100, curve=new Float32Array(n);
        for(let i=0;i<n;i++) { let x=(i*2/n)-1; curve[i]=(3+amt)*x*Math.PI*0.7/(Math.PI+amt*Math.abs(x)); }
        return curve;
    }
    function updateAudioFX() {
        if(!audioNodes) return;
        audioNodes.low.gain.value = parseFloat(document.getElementById('knobLow')?.getAttribute('data-val')||0);
        audioNodes.mid.gain.value = parseFloat(document.getElementById('knobMid')?.getAttribute('data-val')||0);
        audioNodes.high.gain.value = parseFloat(document.getElementById('knobHigh')?.getAttribute('data-val')||0);
        audioNodes.comp.threshold.value = parseFloat(document.getElementById('knobThr')?.getAttribute('data-val')||-20);
        audioNodes.comp.ratio.value = 4;
        audioNodes.shaper.curve = makeDistortionCurve(parseFloat(document.getElementById('knobDist')?.getAttribute('data-val')||0));
        let rev = parseFloat(document.getElementById('knobRev')?.getAttribute('data-val')||0);
        if(rev>0.01 && audioCtx) {
            let sr=audioCtx.sampleRate, len=sr*1.2;
            let impulse=audioCtx.createBuffer(2,len,sr);
            for(let ch=0;ch<2;ch++) { let chan=impulse.getChannelData(ch); for(let i=0;i<len;i++) chan[i]=(Math.random()*2-1)*Math.exp(-i/(sr*0.3)); }
            audioNodes.reverb.buffer=impulse;
        } else audioNodes.reverb.buffer=null;
        audioNodes.dryWet.gain.value=Math.min(1,rev);
    }
    async function startMicrophone() {
        if(audioCtx) await audioCtx.close();
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        createAudioChain();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        sourceNode = audioCtx.createMediaStreamSource(stream);
        sourceNode.connect(audioNodes.low);
        audioNodes.low.connect(audioNodes.mid); audioNodes.mid.connect(audioNodes.high); audioNodes.high.connect(audioNodes.comp);
        audioNodes.comp.connect(audioNodes.shaper);
        audioNodes.shaper.connect(audioNodes.master);
        audioNodes.shaper.connect(audioNodes.reverb); audioNodes.reverb.connect(audioNodes.dryWet); audioNodes.dryWet.connect(audioNodes.master);
        audioNodes.master.connect(audioNodes.analys);
        audioNodes.analys.connect(audioCtx.destination);
        await audioCtx.resume();
        isAudioActive = true;
        document.getElementById('audioStatus').innerText = '🎤 マイクON';
    }
    async function startAudioFile() {
        let inp = document.createElement('input'); inp.type='file'; inp.accept='audio/*';
        inp.onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            if(audioCtx) await audioCtx.close();
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            createAudioChain();
            const buf = await file.arrayBuffer();
            const decoded = await audioCtx.decodeAudioData(buf);
            const bs = audioCtx.createBufferSource();
            bs.buffer = decoded; bs.loop = true;
            sourceNode = bs;
            bs.connect(audioNodes.low);
            audioNodes.low.connect(audioNodes.mid); audioNodes.mid.connect(audioNodes.high); audioNodes.high.connect(audioNodes.comp);
            audioNodes.comp.connect(audioNodes.shaper);
            audioNodes.shaper.connect(audioNodes.master);
            audioNodes.shaper.connect(audioNodes.reverb); audioNodes.reverb.connect(audioNodes.dryWet); audioNodes.dryWet.connect(audioNodes.master);
            audioNodes.master.connect(audioNodes.analys);
            audioNodes.analys.connect(audioCtx.destination);
            bs.start(0);
            await audioCtx.resume();
            isAudioActive = true;
            document.getElementById('audioStatus').innerHTML = `▶️ ${file.name.slice(0,24)}`;
        };
        inp.click();
    }
    document.getElementById('micBtn').onclick = startMicrophone;
    document.getElementById('fileBtn').onclick = startAudioFile;

    function updateAudioMeters() {
        if(!isAudioActive || !audioNodes?.analys) {
            avgVolume *= 0.98; bassEnergy *= 0.98; highEnergy *= 0.98;
            return;
        }
        const analys = audioNodes.analys;
        const freqLen = analys.frequencyBinCount;
        if(freqData.length !== freqLen) { freqData = new Uint8Array(freqLen); timeData = new Uint8Array(analyser.fftSize); }
        analys.getByteFrequencyData(freqData);
        analys.getByteTimeDomainData(timeData);
        let sum=0, bass=0, high=0;
        for(let i=0; i<freqLen; i++) { let v=freqData[i]/255; sum+=v; if(i<12) bass+=v; if(i>60) high+=v; }
        avgVolume = sum / freqLen;
        bassEnergy = bass/12;
        highEnergy = high/(freqLen-60);
        let vu = Math.min(1.0, avgVolume*1.5);
        document.getElementById('vuFill').style.width = (vu*100)+'%';
        document.getElementById('vuText').innerText = Math.floor(vu*100)+'%';
        document.getElementById('bassFill').style.width = (Math.min(1.0, bassEnergy*1.5)*100)+'%';
        document.getElementById('highFill').style.width = (Math.min(1.0, highEnergy*1.5)*100)+'%';
        // спектрограмма
        let specC = document.getElementById('spectrogram');
        let sCtx = specC.getContext('2d');
        let sw = specC.width, sh = specC.height;
        let img = sCtx.getImageData(1,0,sw-1,sh);
        sCtx.putImageData(img,0,0);
        sCtx.fillStyle='#000'; sCtx.fillRect(sw-1,0,1,sh);
        for(let i=0;i<freqData.length;i++) { let barH=(freqData[i]/255)*sh; sCtx.fillStyle='#fff'; sCtx.fillRect(sw-1,sh-barH,1,barH); }
        // спектр
        let specC2 = document.getElementById('spectrum');
        let sCtx2 = specC2.getContext('2d');
        sCtx2.fillStyle='#000'; sCtx2.fillRect(0,0,specC2.width,specC2.height);
        if(freqData.length) { let bw=specC2.width/freqLen; for(let i=0;i<freqLen;i++) { let h=(freqData[i]/255)*specC2.height; sCtx2.fillStyle='#fff'; sCtx2.fillRect(i*bw,specC2.height-h,Math.max(1,bw-1),h); } }
        // огибающая
        let envC = document.getElementById('envelope');
        let eCtx = envC.getContext('2d');
        eCtx.fillStyle='#000'; eCtx.fillRect(0,0,envC.width,envC.height);
        if(freqData.length) { let step=Math.floor(freqData.length/envC.width); eCtx.beginPath(); for(let x=0;x<envC.width;x++) { let idx=Math.min(freqData.length-1,x*step); let y=envC.height-(freqData[idx]/255)*envC.height; if(x===0) eCtx.moveTo(x,y); else eCtx.lineTo(x,y); } eCtx.strokeStyle='#fff'; eCtx.stroke(); }
        // доминанта
        let maxIdx=0; for(let i=0;i<freqData.length;i++) if(freqData[i]>freqData[maxIdx]) maxIdx=i;
        let sr = audioCtx?.sampleRate || 44100;
        let fft = audioNodes?.analys?.fftSize || 512;
        let dom = (maxIdx * sr) / fft;
        document.getElementById('dominantFreq').innerHTML = `ドミナント: ${Math.round(dom)} Hz`;
    }

    // ---------- ノブ制御 ----------
    function makeKnob(id, min, max, init, callback) {
        const el = document.getElementById(id);
        let val = init;
        const span = document.getElementById(id.replace('knob','')+'Val');
        const update = () => { let perc=(val-min)/(max-min); el.style.setProperty('--val',perc); if(span) span.innerText=val.toFixed(1); el.setAttribute('data-val',val); callback(val); };
        const set = (v) => { val = Math.min(max,Math.max(min,v)); update(); };
        set(init);
        el.addEventListener('mousedown', (e) => {
            const startX=e.clientX, startVal=val;
            const move = (me) => { let delta=(me.clientX-startX)*0.008; set(startVal+delta*(max-min)); };
            const up = () => { window.removeEventListener('mousemove',move); window.removeEventListener('mouseup',up); };
            window.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
            e.preventDefault();
        });
    }
    makeKnob('knobLow',-12,12,0,()=>updateAudioFX());
    makeKnob('knobMid',-12,12,0,()=>updateAudioFX());
    makeKnob('knobHigh',-12,12,0,()=>updateAudioFX());
    makeKnob('knobThr',-40,0,-20,()=>updateAudioFX());
    makeKnob('knobDist',0,1.2,0,()=>updateAudioFX());
    makeKnob('knobRev',0,1,0,()=>updateAudioFX());
    makeKnob('knobLfoSpeed',0.1,2,0.5,(v)=>globalLfoSpeed=v);
    makeKnob('knobLfoDepth',0,1,0.3,(v)=>globalLfoDepth=v);
    document.getElementById('resetLfoBtn').onclick = () => { layers.forEach(l=>{ Object.keys(l.lfo).forEach(k=>{ if(l.lfo[k]) { l.lfo[k].enabled=false; l.lfo[k].speed=0.5; l.lfo[k].depth=0.3; } }); }); renderLayersUI(); };

    // ---------- Ручное рисование ----------
    document.getElementById('drawModeBtn').onclick = () => { drawMode=!drawMode; document.getElementById('drawModeBtn').innerText=drawMode?'✏️ 描画中':'✏️ 手描きモード'; };
    document.getElementById('clearDrawBtn').onclick = () => { drawPoints=[]; };
    canvas.addEventListener('mousedown',(e)=>{ if(!drawMode) return; isDrawing=true; const rect=canvas.getBoundingClientRect(); let sx=(e.clientX-rect.left)*(canvas.width/rect.width); let sy=(e.clientY-rect.top)*(canvas.height/rect.height); drawPoints.push({x:sx,y:sy}); });
    canvas.addEventListener('mousemove',(e)=>{ if(!drawMode || !isDrawing) return; const rect=canvas.getBoundingClientRect(); let sx=(e.clientX-rect.left)*(canvas.width/rect.width); let sy=(e.clientY-rect.top)*(canvas.height/rect.height); drawPoints.push({x:sx,y:sy}); });
    canvas.addEventListener('mouseup',()=>{ isDrawing=false; });

    // ---------- Анимация ----------
    function animate() {
        updateAudioMeters();
        drawAllLayers();
        lfoPhase += 0.01;
        animTime += 0.02;
        requestAnimationFrame(animate);
    }
    animate();

    // ---------- Перетаскивание окон ----------
    function makeDraggable(panel) {
        const header = panel.querySelector('.panel-header');
        if (!header) return;
        let isDrag=false, offX, offY;
        header.onmousedown = (e) => {
            isDrag=true; offX=e.clientX-panel.offsetLeft; offY=e.clientY-panel.offsetTop;
            panel.style.zIndex=1002; document.body.style.userSelect='none';
            const move=(me)=>{ if(!isDrag) return; let left=me.clientX-offX, top=me.clientY-offY; left=Math.min(Math.max(left,0),window.innerWidth-panel.offsetWidth); top=Math.min(Math.max(top,0),window.innerHeight-panel.offsetHeight); panel.style.left=left+'px'; panel.style.top=top+'px'; };
            const up=()=>{ isDrag=false; document.body.style.userSelect=''; window.removeEventListener('mousemove',move); window.removeEventListener('mouseup',up); };
            window.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
            e.preventDefault();
        };
    }
    document.querySelectorAll('.panel').forEach(p=>makeDraggable(p));

    // ---------- Ресайз ----------
    window.addEventListener('resize',()=>{ let cont=document.getElementById('canvasContainer'); if(cont){ let newW=cont.clientWidth*0.8; canvas.style.width=newW+'px'; canvas.width=800; canvas.height=600; w=800; h=600; centerX=w/2; centerY=h/2; } });
    window.dispatchEvent(new Event('resize'));

    // ---------- Стартовые слои ----------
    layers.push(createLayer('super'));
    layers.push(createLayer('lissajous'));
    renderLayersUI();
})();
</script>
